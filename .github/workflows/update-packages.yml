name: Update Package Versions

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 8 * * 2' # Runs Tuesdays at 08:00 UTC (day after flake update)

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Install dependencies
        run: |
          nix profile install nixpkgs#nix-prefetch-github nixpkgs#goose nixpkgs#jq

      - name: Configure Goose for Venice.ai
        run: |
          mkdir -p ~/.config/goose
          cat > ~/.config/goose/config.yaml << 'EOF'
          providers:
            venice:
              type: openai
              base_url: https://api.venice.ai/api/v1
              model: zai-org-glm-5
          default_provider: venice
          keyring: false
          GOOSE_DISABLE_KEYRING: true
          GOOSE_TELEMETRY_ENABLED: false
          extensions: {}
          EOF

      - name: Run AI-enhanced package updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VENICE_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          OPENAI_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          USE_LLM_FIXES: true
        run: |
          chmod +x update-packages-ai.sh
          bash update-packages-ai.sh
      
      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: automated package updates'
          title: 'Automated Package Version Updates'
          body: |
            ## Automated Package Updates
            
            This PR contains automated version updates for packages.
            
            🤖 Generated by OpenCode automated update workflow
          branch: automated-package-updates
          delete-branch: true
          labels: |
            dependencies
            automated