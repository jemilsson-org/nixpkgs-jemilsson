name: Update Package Versions

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 8 * * 2' # Runs Tuesdays at 08:00 UTC (day after flake update)

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Install Goose CLI
        run: |
          mkdir -p /home/runner/.local/bin
          curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh \
            | CONFIGURE=false GOOSE_BIN_DIR=/home/runner/.local/bin bash
          echo "/home/runner/.local/bin" >> $GITHUB_PATH
      
      - name: Configure Goose for Venice.ai
        run: |
          mkdir -p ~/.config/goose
          cat <<EOF > ~/.config/goose/config.yaml
          GOOSE_PROVIDER: openai
          GOOSE_MODEL: zai-org-glm-5
          keyring: false
          GOOSE_DISABLE_KEYRING: true
          GOOSE_TELEMETRY_ENABLED: false
          extensions: {}
          EOF
        env:
          OPENAI_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          OPENAI_BASE_URL: https://api.venice.ai
      
      - name: Update packages with Goose
        env:
          OPENAI_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          OPENAI_BASE_URL: https://api.venice.ai/api/v1/chat/completions
          GOOSE_PROVIDER: openai
          GOOSE_MODEL: zai-org-glm-5
        run: |
          goose run --no-session -t "Review all Nix packages in the packages/ directory and update them to their latest stable versions. For each package that needs updating: 1) Check the current version in default.nix, 2) Find the latest stable release from the upstream source (GitHub releases, PyPI, etc), 3) Update the version number and rev/tag in the default.nix file, 4) Use nix-prefetch-url or nix-prefetch-github to get the correct hash and update it, 5) Test the build with 'nix build .#packages.x86_64-linux.PACKAGENAME', 6) Create a commit with message 'packagename: oldversion -> newversion'. Only update to stable releases, no pre-releases or betas."
      
      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: automated package updates'
          title: 'Automated Package Version Updates'
          body: |
            ## Automated Package Updates
            
            This PR contains automated version updates for packages.
            
            🤖 Generated by OpenCode automated update workflow
          branch: automated-package-updates
          delete-branch: true
          labels: |
            dependencies
            automated