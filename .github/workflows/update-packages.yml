name: Update Package Versions

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 8 * * 2' # Runs Tuesdays at 08:00 UTC (day after flake update)

jobs:
  update-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Update packages with OpenCode
        uses: opencode-ai/opencode-action@v1
        with:
          api_key: ${{ secrets.VENICE_INFERENCE_KEY }}
          model: 'zai-org-glm-5'
          base_url: 'https://api.venice.ai/api/v1'
          max_tokens: 16000
          instructions: |
            Update all package versions in the packages/ directory to their latest stable versions.
            
            For each package in packages/:
            1. Check if there's a newer version available from the upstream source
            2. If a newer version exists:
               - Update the version number in default.nix
               - Update the hash/sha256 if present (set to lib.fakeHash temporarily if needed)
               - Update any other version-dependent attributes
            3. Focus on these common version sources:
               - GitHub releases (fetchFromGitHub)
               - PyPI packages (for Python packages)
               - NPM registry (for Node packages)
               - Official project websites
            
            Guidelines:
            - Only update to stable releases (no pre-releases, betas, or release candidates)
            - Preserve all existing package configurations and build options
            - Keep the same source type (don't change fetchFromGitHub to fetchurl, etc.)
            - If a package has a comment indicating it's pinned to a specific version, skip it
            - For packages using fetchFromGitHub, check the GitHub API for latest releases
            - Update the rev field to match the new version tag
            
            Create one commit per package update with message format:
            "packagename: version1 -> version2"
            
            If you encounter build failures due to hash mismatches, that's expected and will be fixed in a later CI step.
      
      - name: Fix hashes for updated packages
        if: success()
        run: |
          # Get list of modified packages
          modified_packages=$(git diff --name-only HEAD^ | grep "^packages/" | cut -d'/' -f2 | sort -u)
          
          for package in $modified_packages; do
            echo "Attempting to build and fix hash for $package..."
            
            # Try to build the package, which will fail with correct hash
            if ! nix build --no-link ".#packages.x86_64-linux.$package" 2>&1 | tee build.log; then
              # Extract the correct hash from error message
              correct_hash=$(grep -oP '(?<=got:)[\s]*sha256-[a-zA-Z0-9+/=]+' build.log | xargs)
              
              if [ ! -z "$correct_hash" ]; then
                echo "Found correct hash: $correct_hash"
                # Update the hash in the default.nix file
                sed -i "s/lib\.fakeHash/\"$correct_hash\"/g" "packages/$package/default.nix"
                sed -i "s/sha256-[a-zA-Z0-9+/=]\+/\"$correct_hash\"/g" "packages/$package/default.nix"
                
                # Commit the hash fix
                git add "packages/$package/default.nix"
                git commit -m "$package: fix hash after version update"
              fi
            fi
          done
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: automated package updates'
          title: 'Automated Package Version Updates'
          body: |
            ## Automated Package Updates
            
            This PR contains automated version updates for packages in this repository.
            
            ### Updated Packages
            Check the commit history for specific version changes.
            
            ### Review Checklist
            - [ ] Version updates are to stable releases
            - [ ] Hashes have been updated correctly
            - [ ] No breaking changes introduced
            
            🤖 Generated by OpenCode automated update workflow
          branch: automated-package-updates
          delete-branch: true
          labels: |
            dependencies
            automated
          reviewers: jemilsson
          assignees: jemilsson

  test-updates:
    needs: update-packages
    runs-on: [self-hosted, nixos]
    if: ${{ needs.update-packages.outputs.pull-request-number }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: automated-package-updates
      
      - name: Test all updated packages
        run: |
          # Get list of modified packages
          modified_packages=$(git diff --name-only origin/master | grep "^packages/" | cut -d'/' -f2 | sort -u)
          
          all_passed=true
          failed_packages=""
          
          for package in $modified_packages; do
            echo "Testing build for updated package: $package"
            if ! nix build --no-link ".#packages.x86_64-linux.$package" --print-build-logs; then
              echo "Build failed for $package"
              failed_packages="$failed_packages $package"
              all_passed=false
            fi
          done
          
          if [ "$all_passed" = false ]; then
            echo "The following packages failed to build: $failed_packages"
            exit 1
          fi
        env:
          NIX_CONFIG: |
            experimental-features = nix-command flakes
            substituters = https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=