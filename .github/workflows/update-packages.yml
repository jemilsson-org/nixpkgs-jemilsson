name: Update Package Versions

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 8 * * 2' # Runs Tuesdays at 08:00 UTC (day after flake update)

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Install OpenCode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Update packages with OpenCode
        env:
          OPENAI_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          OPENAI_BASE_URL: https://api.venice.ai/api/v1
        run: |
          # Configure OpenCode
          cat > ~/.opencode/config.json << EOF
          {
            "providers": [
              {
                "name": "openai",
                "api_key_env": "OPENAI_API_KEY",
                "base_url": "https://api.venice.ai/api/v1"
              }
            ],
            "models": {
              "default": "openai/zai-org-glm-5"
            }
          }
          EOF
          
          # Run OpenCode with a simple test prompt first
          opencode task "List all directories in the packages/ folder and identify which ones contain Nix package definitions (default.nix files)."
      
      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: automated package updates'
          title: 'Automated Package Version Updates'
          body: |
            ## Automated Package Updates
            
            This PR contains automated version updates for packages.
            
            🤖 Generated by OpenCode automated update workflow
          branch: automated-package-updates
          delete-branch: true
          labels: |
            dependencies
            automated