name: Update Package Versions

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 8 * * 2' # Runs Tuesdays at 08:00 UTC (day after flake update)

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup OpenCode
        run: |
          echo "Setting up OpenCode environment..."
          echo "OPENAI_API_KEY is set: ${{ secrets.VENICE_INFERENCE_KEY != '' }}"
          echo "Using model: openai/zai-org-glm-5"
          echo "Base URL: https://api.venice.ai/api/v1"
      
      - name: Run OpenCode to update packages
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          OPENAI_BASE_URL: https://api.venice.ai/api/v1
          DEBUG: "true"
        with:
          model: openai/zai-org-glm-5
          prompt: |
            List the files in the packages directory and summarize what packages are present.