name: Update Package Versions

on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: '0 8 * * 2' # Runs Tuesdays at 08:00 UTC (day after flake update)

jobs:
  update-packages:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Run OpenCode to update packages
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          OPENAI_BASE_URL: https://api.venice.ai/api/v1
        with:
          model: venice/zai-org-glm-5
          prompt: |
            Review all packages in the packages/ directory and update them to their latest stable versions.
            
            For each package:
            1. Check the current version in default.nix
            2. Look up the latest stable version from the upstream source
            3. If a newer version exists, update the package definition:
               - Update the version number
               - Update the rev/tag for fetchFromGitHub sources  
               - Update the hash/sha256 (you can use nix-prefetch-url or nix-prefetch-github to get correct hashes)
            
            Guidelines:
            - Only update to stable releases (no pre-releases, betas, or RCs)
            - Keep the existing package structure and options
            - For GitHub sources, check the releases page for latest stable version
            - For Python packages, check PyPI for latest version
            - Skip packages with comments indicating they're pinned to specific versions
            - Test that the updated package builds correctly with: nix build .#packages.x86_64-linux.PACKAGENAME
            
            Process:
            1. Update each package that needs updating
            2. Fix any hash mismatches by building and using the correct hash from the error
            3. Create one commit per package with message: "packagename: oldversion -> newversion"
            4. After all updates are complete, create a pull request titled "Automated Package Updates"
            5. In the PR description, list all packages that were updated with their version changes