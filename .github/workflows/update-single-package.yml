name: Update Single Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to update'
        required: true
        type: string

jobs:
  update-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Update package directly
        run: |
          PACKAGE="${{ github.event.inputs.package }}"
          PKG_DIR="packages/$PACKAGE"
          
          if [ ! -f "$PKG_DIR/default.nix" ]; then
            echo "Package $PACKAGE not found in packages/"
            exit 1
          fi
          
          echo "Updating $PACKAGE..."
          
          # Extract current version
          current_version=$(grep -Po '(?<=version = ")[^"]+' "$PKG_DIR/default.nix" 2>/dev/null || echo "unknown")
          
          # Get GitHub info if applicable
          if grep -q "fetchFromGitHub" "$PKG_DIR/default.nix"; then
            owner=$(grep -Po '(?<=owner = ")[^"]+' "$PKG_DIR/default.nix" | head -1)
            repo=$(grep -Po '(?<=repo = ")[^"]+' "$PKG_DIR/default.nix" | head -1)
            
            if [ -n "$owner" ] && [ -n "$repo" ]; then
              # Get latest release
              latest_release=$(curl -s "https://api.github.com/repos/$owner/$repo/releases/latest" | jq -r '.tag_name // empty')
              
              if [ -z "$latest_release" ]; then
                # Try tags
                latest_release=$(curl -s "https://api.github.com/repos/$owner/$repo/tags" | jq -r '.[0].name // empty')
              fi
              
              if [ -n "$latest_release" ]; then
                # Skip pre-releases
                if [[ ! "$latest_release" =~ (alpha|beta|rc|pre|dev|nightly) ]]; then
                  latest_version="${latest_release#v}"
                  
                  if [ "$current_version" != "$latest_version" ] && [ "$current_version" != "$latest_release" ]; then
                    echo "Updating $PACKAGE: $current_version -> $latest_version"
                    
                    # Get new hash
                    new_hash=$(nix-prefetch-github "$owner" "$repo" --rev "$latest_release" 2>/dev/null | jq -r .hash)
                    
                    if [ -n "$new_hash" ]; then
                      # Update version
                      sed -i "s/version = \"$current_version\"/version = \"$latest_version\"/" "$PKG_DIR/default.nix"
                      
                      # Update rev
                      sed -i "s/rev = \".*\"/rev = \"$latest_release\"/" "$PKG_DIR/default.nix"
                      
                      # Update hash
                      old_hash=$(grep -Po '(?<=hash = ")[^"]+' "$PKG_DIR/default.nix" | head -1)
                      if [ -n "$old_hash" ]; then
                        sed -i "s|hash = \"$old_hash\"|hash = \"$new_hash\"|" "$PKG_DIR/default.nix"
                      fi
                      
                      # Test build
                      if nix build ".#packages.x86_64-linux.$PACKAGE" 2>/dev/null; then
                        git add "$PKG_DIR/default.nix"
                        git commit -m "$PACKAGE: $current_version -> $latest_version"
                        echo "Successfully updated $PACKAGE"
                      else
                        echo "Build failed for $PACKAGE"
                        git checkout -- "$PKG_DIR/default.nix"
                      fi
                    fi
                  else
                    echo "$PACKAGE is already up to date"
                  fi
                fi
              fi
            fi
          fi
      
      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update ${{ github.event.inputs.package }}'
          title: 'Update ${{ github.event.inputs.package }}'
          body: |
            ## Package Update: ${{ github.event.inputs.package }}
            
            This PR updates the ${{ github.event.inputs.package }} package to its latest stable version.
            
            🤖 Generated by automated update workflow
          branch: update-${{ github.event.inputs.package }}
          delete-branch: true
          labels: |
            dependencies
            automated