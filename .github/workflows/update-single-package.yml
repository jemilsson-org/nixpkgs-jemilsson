name: Update Single Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to update'
        required: true
        type: string

jobs:
  update-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Configure Goose for Venice.ai
        run: |
          mkdir -p ~/.config/goose
          cat > ~/.config/goose/config.yaml << 'EOF'
          providers:
            venice:
              type: openai
              base_url: https://api.venice.ai/api/v1
              model: zai-org-glm-5
          default_provider: venice
          keyring: false
          GOOSE_DISABLE_KEYRING: true
          GOOSE_TELEMETRY_ENABLED: false
          extensions: {}
          EOF

      - name: Update single package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VENICE_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          OPENAI_API_KEY: ${{ secrets.VENICE_INFERENCE_KEY }}
          USE_LLM_FIXES: true
        run: |
          PACKAGE="${{ github.event.inputs.package }}"

          # Verify package exists
          if [ ! -f "packages/$PACKAGE/default.nix" ]; then
            echo "Error: Package '$PACKAGE' not found in packages/"
            exit 1
          fi

          echo "Updating $PACKAGE with AI-enhanced script..."
          chmod +x update-packages-ai.sh

          # Create a filtered version that only processes the specified package
          cat > update-single.sh << 'SCRIPT'
          #!/usr/bin/env nix-shell
          #!nix-shell -i bash -p bash curl jq nix-prefetch-github goose

          # Source the main update script's functions
          source ./update-packages-ai.sh

          # Override the Phase 1 to only check the specified package
          PACKAGE="$1"
          log_info "=== Checking $PACKAGE for updates ==="
          check_for_updates "packages/$PACKAGE/" || exit 0

          # Phase 2 continues normally with updates.txt
          SCRIPT

          chmod +x update-single.sh
          ./update-single.sh "$PACKAGE"
      
      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update ${{ github.event.inputs.package }}'
          title: 'Update ${{ github.event.inputs.package }}'
          body: |
            ## Package Update: ${{ github.event.inputs.package }}
            
            This PR updates the ${{ github.event.inputs.package }} package to its latest stable version.
            
            🤖 Generated by automated update workflow
          branch: update-${{ github.event.inputs.package }}
          delete-branch: true
          labels: |
            dependencies
            automated